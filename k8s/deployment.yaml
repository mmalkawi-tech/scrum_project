apiVersion: apps/v1
kind: Deployment
metadata:
  name: medappoint-app
  labels:
    app: medappoint-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medappoint-app
  template:
    metadata:
      labels:
        app: medappoint-app
    spec:
      containers:
        - name: medappoint-app
          image: medappointacr.azurecr.io/medappoint-app:v1
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medappoint-db-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10